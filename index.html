<title>開戶條件篩選器</title>
<style>
  * { box-sizing: border-box; }
  body {
    margin: 0; min-height: 100vh; display: grid; place-items: center;
    font-family: -apple-system, "PingFang TC", "Microsoft JhengHei", sans-serif;
    background: #f5f6f8; color: #222; padding: 20px;
  }
  main {
    width: min(420px, 100%); background: #fff; border: 1px solid #e3e7ee;
    border-radius: 8px; box-shadow: 0 10px 35px rgba(31,58,104,.12);
    padding: 24px;

  p { margin: 0 0 18px; color: #666; font-size: 14px; line-height: 1.6; }

  input {
    width: 100%; padding: 11px 12px; border: 1px solid #ccd4df;
    border-radius: 6px; font-size: 15px;
  }
  button {
    width: 100%; margin-top: 14px; border: 0; border-radius: 6px;
    background: #1f3a68; color: #fff; padding: 11px 14px;
    font-size: 15px; font-weight: 600; cursor: pointer;
  }
  button:disabled { opacity: .65; cursor: wait; }
  .msg { min-height: 20px; margin-top: 12px; color: #b42318; font-size: 13px; }
  .meta { margin-top: 16px; color: #999; font-size: 12px; }
</style>
</head>

function fromBase64(value) {
  const binary = atob(value);
  const bytes = new Uint8Array(binary.length);
  for (let i = 0; i < binary.length; i++) bytes[i] = binary.charCodeAt(i);
  return bytes;
}

async function decryptHtml(password) {
  const enc = new TextEncoder();
  const keyMaterial = await crypto.subtle.importKey(
    'raw',
    enc.encode(password),
    'PBKDF2',
    false,
    ['deriveKey']
  );
  const key = await crypto.subtle.deriveKey(
    {
      name: 'PBKDF2',
      salt: fromBase64(PAYLOAD.salt),
      iterations: PAYLOAD.iterations,
      hash: 'SHA-256'
    },
    keyMaterial,
    { name: 'AES-GCM', length: 256 },
    false,
    ['decrypt']
  );
  const plain = await crypto.subtle.decrypt(
    { name: 'AES-GCM', iv: fromBase64(PAYLOAD.iv) },
    key,
    fromBase64(PAYLOAD.data)
  );
  return new TextDecoder().decode(plain);
}

document.getElementById('unlockForm').addEventListener('submit', async event => {
  event.preventDefault();
  const btn = document.getElementById('unlockBtn');
  const msg = document.getElementById('msg');
  const password = document.getElementById('password').value;
  btn.disabled = true;
  msg.textContent = '解密中...';
  try {
    const html = await decryptHtml(password);
    document.open();
    document.write(html);
    document.close();
  } catch (error) {
    msg.textContent = '密碼錯誤或檔案已損壞。';
    btn.disabled = false;
  }
});
</script>
