function b2b(s){const b=atob(s),u=new Uint8Array(b.length);for(let i=0;i<b.length;i++)u[i]=b.charCodeAt(i);return u;}
async function unlock(){
  const pw=document.getElementById('pw').value, err=document.getElementById('err');
  err.textContent='解鎖中…';
  try{
    const km=await crypto.subtle.importKey('raw',new TextEncoder().encode(pw),'PBKDF2',false,['deriveKey']);
    const key=await crypto.subtle.deriveKey({name:'PBKDF2',salt:b2b(SALT),iterations:ITER,hash:'SHA-256'},km,{name:'AES-GCM',length:256},false,['decrypt']);

    document.open();document.write(html);document.close();
  }catch(e){err.textContent='密碼錯誤，請再試一次';}
}
